<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LangLab Escape — LAEN475</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Nunito:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<style>
:root{
  --bg:#0B0F1A;--card:#141B2D;--card2:#1a2340;--neon:#00ff88;--cyan:#00d4ff;
  --warn:#ff6b35;--danger:#ff3366;--purple:#c084fc;--gold:#ffe066;
  --text:#e8ecf1;--dim:#6b7fa3;--dark:#3a4a6b;
  --fs-xs:13px;--fs-sm:15.6px;--fs-base:20.8px;--fs-md:23.4px;--fs-lg:28.6px;
  --fs-xl:33.8px;--fs-2xl:41.6px;--fs-3xl:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;font-size:var(--fs-base)}
button{font-family:inherit;border:none;cursor:pointer;font-size:inherit}
input{font-family:inherit;font-size:inherit}
input:focus{outline:2px solid var(--neon)}
.hf{font-family:'Orbitron','Courier New',monospace}
.mf{font-family:'Source Code Pro','Courier New',monospace}
.screen{display:none;min-height:100vh;position:relative}.screen.active{display:flex;flex-direction:column}
.bg-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.18;pointer-events:none;z-index:0}
.sc{position:relative;z-index:1}
#audio-ctrl{position:fixed;bottom:16px;right:16px;z-index:1000;display:flex;align-items:center;gap:8px;background:rgba(20,27,45,.92);border:1px solid rgba(0,255,136,.2);border-radius:30px;padding:6px 14px;backdrop-filter:blur(8px)}
#audio-ctrl button{background:none;color:var(--neon);font-size:var(--fs-md);padding:4px 6px;cursor:pointer;border:none;line-height:1}
#audio-ctrl input[type=range]{width:70px;accent-color:var(--neon)}
.giveup-bar{position:fixed;top:12px;right:16px;z-index:900}
.giveup-btn{background:rgba(255,51,102,.08);border:1px solid rgba(255,51,102,.25);border-radius:8px;padding:6px 14px;color:var(--danger);font-size:var(--fs-xs);font-weight:700;letter-spacing:.5px;transition:all .2s}
.giveup-btn:hover{background:rgba(255,51,102,.2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--neon),0 0 15px rgba(0,255,136,.2)}50%{box-shadow:0 0 15px var(--neon),0 0 40px rgba(0,255,136,.4)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanline{0%{top:-100%}100%{top:200%}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(500px) rotate(720deg);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes typewriter{from{width:0}to{width:100%}}
@keyframes blink{0%,100%{border-color:var(--neon)}50%{border-color:transparent}}
.fi{animation:fadeIn .6s ease-out both}.su{animation:slideUp .5s ease-out both}
.glow-border{animation:glow 2s ease-in-out infinite}
.scanl{position:absolute;top:-100%;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(0,255,136,.15),transparent);animation:scanline 4s linear infinite;pointer-events:none}
.card{background:var(--card);border:1px solid rgba(107,127,163,.15);border-radius:14px;padding:18px;position:relative;overflow:hidden;transition:all .3s;margin-bottom:16px}
.opt{width:100%;padding:16px 18px;text-align:left;background:var(--card);border:1px solid rgba(107,127,163,.15);border-radius:12px;color:var(--text);font-size:var(--fs-base);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;margin-bottom:12px}
.opt.sel{background:rgba(0,255,136,.12);border:2px solid var(--neon)}
.opt.elim{opacity:.15;pointer-events:none;text-decoration:line-through}
.oc{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--card2);color:var(--dim);font-size:var(--fs-sm);font-weight:700;flex-shrink:0}
.opt.sel .oc{background:var(--neon);color:var(--bg)}
.tf{flex:1;padding:20px;text-align:center;background:var(--card);border:1px solid rgba(107,127,163,.15);border-radius:14px;color:var(--text);font-size:var(--fs-md);font-weight:700;cursor:pointer;transition:all .2s}
.tf.st{background:rgba(0,255,136,.12);border:2px solid var(--neon)}
.tf.sf{background:rgba(255,51,102,.1);border:2px solid var(--danger)}
.tf.elim{opacity:.15;pointer-events:none}
.mb{padding:14px 12px;text-align:left;font-size:var(--fs-sm);background:var(--card);border:1px solid rgba(107,127,163,.15);border-radius:10px;color:var(--text);cursor:pointer;transition:all .2s;line-height:1.3;position:relative;width:100%;margin-bottom:10px}
.mb.mact{background:rgba(0,255,136,.15);border:2px solid var(--neon)}
.mb.mwait{background:rgba(0,212,255,.06);border:1px dashed rgba(0,212,255,.3)}
.mb.mpaired{opacity:.5;pointer-events:none}
.pd{position:absolute;top:5px;right:8px;width:10px;height:10px;border-radius:50%}
.hint-btn{padding:8px 12px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.3px;transition:all .2s}
.hint-btn:disabled{opacity:.25;cursor:default}
.life{display:inline-block;font-size:var(--fs-md);margin:0 2px;transition:all .3s}
.life.lost{opacity:.15;filter:grayscale(1)}
#confetti-box{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;display:none}
.cp{position:absolute;top:-20px}
.wrap{max-width:640px;margin:0 auto;width:100%;padding:22px}
.whisper-box{background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.3);border-radius:10px;padding:12px 16px;margin-top:14px;font-size:var(--fs-sm);color:var(--purple);line-height:1.5}
.field-label{display:block;text-align:left;font-size:var(--fs-xs);color:var(--cyan);margin-bottom:8px;letter-spacing:1px}
.field-input{width:100%;padding:14px 16px;background:var(--card);border:1px solid rgba(0,255,136,.3);border-radius:10px;color:var(--text)}
.nav-btn{flex:1;padding:16px;border-radius:12px;font-weight:600;transition:all .2s}
/* Intro slides */
.intro-slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;opacity:0;transition:opacity .8s ease;pointer-events:none}
.intro-slide.active{opacity:1;pointer-events:auto}
.intro-text{font-size:var(--fs-md);line-height:1.7;max-width:480px;color:var(--dim)}
.intro-text strong{color:var(--text)}
.intro-text em{color:var(--neon);font-style:normal;font-weight:700}
/* Instructions */
.rule-card{background:var(--card);border-radius:12px;padding:16px 18px;margin-bottom:12px;border-left:3px solid var(--neon);font-size:var(--fs-sm);line-height:1.6;color:var(--dim)}
.rule-card .rule-icon{font-size:24px;margin-bottom:6px}
.rule-card strong{color:var(--text)}
.rule-warning{border-left-color:var(--danger)}
.rule-hint{border-left-color:var(--cyan)}
@media(max-width:480px){:root{--fs-xs:12px;--fs-sm:14px;--fs-base:18px;--fs-md:20px;--fs-lg:24px;--fs-xl:28px;--fs-2xl:34px;--fs-3xl:42px}}
</style>
</head>
<body>
<audio id="bg-audio" loop preload="auto"><source src="langlab-bgm.mp3" type="audio/mpeg"></audio>

<div id="audio-ctrl">

  <input type="range" id="audio-vol" min="0" max="100" value="40" oninput="setVol(this.value)">
</div>
<div id="giveup-container" class="giveup-bar" style="display:none">
  <button class="giveup-btn mf" onclick="confirmGiveUp()">🏳️ Give Up</button>
</div>
<div id="confetti-box"></div>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen" class="screen active" style="align-items:center;justify-content:center;text-align:center;padding:24px">
  <img class="bg-img" src="bg-homepage.png" alt="">
  <div class="sc" style="width:100%;max-width:440px">
    <div class="hf" style="font-size:clamp(var(--fs-3xl),10vw,72px);font-weight:900;color:var(--neon);text-shadow:0 0 30px rgba(0,255,136,.4);letter-spacing:2px">LANGLAB</div>
    <div class="hf" style="font-size:clamp(var(--fs-sm),3.5vw,var(--fs-md));color:var(--cyan);letter-spacing:6px;margin-top:-4px">E S C A P E</div>
    <div style="width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--neon),transparent);margin:20px auto"></div>
    <p style="font-size:var(--fs-sm);color:var(--dim);max-width:400px;line-height:1.6;margin:0 auto 28px">Enter your team details to begin the mission.</p>
    <label class="mf field-label">PLAYER 1 (Required)</label>
    <input id="p1-input" class="field-input" placeholder="Enter name" style="margin-bottom:14px">
    <label class="mf field-label">PLAYER 2 (Optional)</label>
    <input id="p2-input" class="field-input" placeholder="Enter name or leave blank" style="margin-bottom:14px">
    <label class="mf field-label">TEAM NAME</label>
    <input id="team-input" class="field-input" placeholder="e.g. Team Alpha" style="margin-bottom:20px">
    <button id="login-btn" class="hf" style="width:100%;padding:16px;background:linear-gradient(135deg,var(--neon),var(--cyan));border-radius:10px;color:var(--bg);font-size:var(--fs-base);font-weight:700;letter-spacing:1px">INITIALIZE ACCESS</button>
    <div id="login-error" style="color:var(--danger);font-size:var(--fs-xs);margin-top:8px;min-height:20px"></div>
    <div class="mf" style="margin-top:28px;font-size:var(--fs-xs);color:var(--dark)">LAEN475 · English Language Teaching</div>
  </div>
</div>

<!-- ═══ INTRO SLIDES ═══ -->
<div id="intro-screen" class="screen" style="background:#0B0F1A;overflow:hidden">
  <img class="bg-img" src="bg-homepage.png" alt="" style="opacity:.1">
  <div id="intro-slides" style="position:relative;width:100%;height:100%;min-height:100vh"></div>
</div>

<!-- ═══ INSTRUCTIONS ═══ -->
<div id="instruct-screen" class="screen" style="align-items:center;padding:24px">
  <img class="bg-img" src="bg-homepage.png" alt="">
  <div class="sc wrap" id="instruct-wrap"></div>
</div>

<!-- ═══ HALLWAY ═══ -->
<div id="hallway-screen" class="screen"><img class="bg-img" src="bg-homepage.png" alt=""><div class="wrap sc" id="hallway-wrap"></div></div>
<!-- ═══ ROOM ═══ -->
<div id="room-screen" class="screen"><img class="bg-img" src="" alt="" id="bg-room"><div class="wrap sc" id="room-wrap"></div></div>
<!-- ═══ CHECK ═══ -->
<div id="check-screen" class="screen" style="align-items:center;justify-content:center;padding:24px"><div class="sc" id="check-wrap" style="max-width:480px;width:100%;text-align:center"></div></div>
<!-- ═══ GAME OVER ═══ -->
<div id="gameover-screen" class="screen" style="align-items:center;justify-content:center;padding:24px;text-align:center"><div class="sc"><div style="font-size:64px;margin-bottom:16px">💀</div><div class="hf" style="font-size:var(--fs-2xl);font-weight:900;color:var(--danger)">GAME OVER</div><p style="color:var(--dim);margin-top:12px;max-width:380px;line-height:1.6;font-size:var(--fs-sm)">All Life Powers have been exhausted. The labs remain locked forever.</p><button class="hf" onclick="location.reload()" style="margin-top:24px;padding:16px 36px;background:linear-gradient(135deg,var(--warn),var(--danger));border-radius:12px;color:#fff;font-size:var(--fs-base);font-weight:700;letter-spacing:1px">START OVER</button></div></div>
<!-- ═══ GIVE UP ═══ -->
<div id="giveup-screen" class="screen" style="align-items:center;justify-content:center;padding:24px;text-align:center"><div class="sc"><div style="font-size:64px;margin-bottom:16px">🏳️</div><div class="hf" style="font-size:var(--fs-2xl);font-weight:900;color:var(--dim)">MISSION ABANDONED</div><p style="color:var(--dim);margin-top:12px;max-width:380px;line-height:1.6;font-size:var(--fs-sm)">Your team has chosen to abandon the mission. The labs remain sealed.</p><button class="hf" onclick="location.reload()" style="margin-top:24px;padding:16px 36px;background:var(--card);border:1px solid rgba(107,127,163,.2);border-radius:12px;color:var(--dim);font-size:var(--fs-base);font-weight:600">START OVER</button></div></div>
<!-- ═══ CONGRATS ═══ -->
<div id="congrats-screen" class="screen" style="align-items:center;justify-content:center;padding:24px"><div class="sc" id="congrats-wrap" style="max-width:540px;width:100%;text-align:center"></div></div>

function fmtTime(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);if(h>0)return h+"h "+String(m%60).padStart(2,"0")+"m "+String(s%60).padStart(2,"0")+"s";return m+"m "+String(s%60).padStart(2,"0")+"s";}
function shuffle(a,seed){const r=[...a];let s=seed||42;for(let i=r.length-1;i>0;i--){s=(s*16807)%2147483647;const j=s%(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}

window.enterRoom=function(id){
  if(S.rooms[id]==="unlocked")return;S.cur=id;S.qIdx=0;S.mSel=null;
  if(!S.ans[id]||S.ans[id].length===0)S.ans[id]=new Array(QS[id].length).fill(null);
  if(!S.mOrd[id]){S.mOrd[id]={};QS[id].forEach((q,i)=>{if(q.type==="match")S.mOrd[id][i]=shuffle(q.pairs.map((_,x)=>x),(i+1)*7+id*13+37)});}
  $("bg-room").src=BG[id]||"";renderRoom();show("room-screen");
};

function renderRoom(){
  const qs=QS[S.cur],q=qs[S.qIdx],rm=RM[S.cur-1],hi=S.hints[S.cur];
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:8px"><div><div class="mf" style="font-size:var(--fs-xs);color:var(--dim);letter-spacing:1px">ROOM ${S.cur}</div><div class="hf" style="font-size:var(--fs-sm);font-weight:700;color:${rm.color}">${rm.name}</div></div><div style="text-align:right"><div class="mf" style="font-size:var(--fs-xs);color:var(--dim);margin-bottom:2px">LIVES</div><div>${livesHTML()}</div></div></div>`;
  h+=`<button onclick="renderHallway()" class="mf" style="background:none;color:var(--dim);font-size:var(--fs-xs);margin-bottom:14px;padding:4px 0">← Back to Hallway</button>`;
  h+=`<div style="display:flex;gap:5px;margin-bottom:14px">`;
  qs.forEach((_,i)=>{const a=S.ans[S.cur][i],done=a!==null&&a!==undefined&&(typeof a!=="object"||Object.keys(a).length>0);h+=`<div onclick="jumpQ(${i})" style="flex:1;height:8px;border-radius:4px;cursor:pointer;background:${i===S.qIdx?rm.color:done?"rgba("+hexRgb(rm.color)+",.3)":"var(--card2)"};transition:background .3s"></div>`;});
  h+=`</div>`;
  // 3 Hints
  h+=`<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
    <button class="hint-btn mf" ${hi.f?"disabled":""} onclick="use5050()" style="background:${hi.f?"var(--card2)":"rgba(255,107,53,.1)"};color:${hi.f?"var(--dim)":"var(--warn)"};border:1px solid ${hi.f?"rgba(107,127,163,.15)":"rgba(255,107,53,.3)"}">🎲 50/50${hi.f?" ✓":""}</button>
    <button class="hint-btn mf" ${hi.w?"disabled":""} onclick="useWhisper()" style="background:${hi.w?"var(--card2)":"rgba(192,132,252,.1)"};color:${hi.w?"var(--dim)":"var(--purple)"};border:1px solid ${hi.w?"rgba(107,127,163,.15)":"rgba(192,132,252,.3)"}">🔮 Whisper${hi.w?" ✓":""}</button>
    <button class="hint-btn mf" ${hi.o?"disabled":""} onclick="useOddOut()" style="background:${hi.o?"var(--card2)":"rgba(255,51,102,.08)"};color:${hi.o?"var(--dim)":"var(--danger)"};border:1px solid ${hi.o?"rgba(107,127,163,.15)":"rgba(255,51,102,.25)"}">❌ Odd One Out${hi.o?" ✓":""}</button>
  </div>`;
  h+=`<div class="mf" style="font-size:var(--fs-xs);color:${rm.color};margin-bottom:10px;letter-spacing:1px">CHALLENGE ${S.qIdx+1} OF ${qs.length} · ${q.type==="mc"?"MULTIPLE CHOICE":q.type==="tf"?"TRUE OR FALSE":"MATCHING"}</div>`;
  h+=`<div style="font-size:var(--fs-md);font-weight:700;line-height:1.5;margin-bottom:20px">${q.q}</div>`;
  if(hi.w&&hi.wq===S.qIdx)h+=`<div class="whisper-box">🔮 <em>Whisper from the Expert:</em> ${q.w}</div><div style="margin-bottom:16px"></div>`;
  const ca=S.ans[S.cur][S.qIdx];
  // Combine eliminations from 50/50 and Odd One Out
  const allElim=[];
  if(q.type==="mc"){if(hi.f&&hi.fq===S.qIdx)allElim.push(...hi.fe);if(hi.o&&hi.oq===S.qIdx)allElim.push(...hi.oe);}
  if(q.type==="mc"){q.opts.forEach((o,oi)=>{h+=`<button class="opt ${ca===oi?"sel":""} ${allElim.includes(oi)?"elim":""}" onclick="pickMC(${oi})"><span class="oc mf">${String.fromCharCode(65+oi)}</span>${o}</button>`;});}
  else if(q.type==="tf"){
    let elimT=null,elimF=null;
    if(hi.f&&hi.fq===S.qIdx){if(hi.fe===true)elimT=true;else if(hi.fe===false)elimF=true;}
    if(hi.o&&hi.oq===S.qIdx){if(hi.oe===true)elimT=true;else if(hi.oe===false)elimF=true;}
    h+=`<div style="display:flex;gap:14px"><button class="tf hf ${ca===true?"st":""} ${elimT?"elim":""}" onclick="pickTF(true)">✓ TRUE</button><button class="tf hf ${ca===false?"sf":""} ${elimF?"elim":""}" onclick="pickTF(false)">✗ FALSE</button></div>`;
  } else if(q.type==="match"){
    const order=S.mOrd[S.cur]?.[S.qIdx]||q.pairs.map((_,i)=>i);const ma=(ca&&typeof ca==="object")?ca:{};const pL=new Set(Object.keys(ma).map(Number)),pR=new Set(Object.values(ma));const ap=(hi.f&&hi.fq===S.qIdx)?hi.fe:null;
    h+=`<div class="mf" style="font-size:var(--fs-xs);color:var(--dim);margin-bottom:12px">Tap left, then right to pair.</div><div style="display:flex;gap:12px"><div style="flex:1">`;
    q.pairs.forEach((p,li)=>{const ip=pL.has(li),isAp=ap&&ap.li===li,act=S.mSel===li;h+=`<button class="mb ${act?"mact":""} ${isAp?"mpaired":""}" onclick="${isAp?"":ip?`unpairM(${li})`:`tapL(${li})`}">${(ip||isAp)?`<span class="pd" style="background:${["#00ff88","#00d4ff","#ff6b35","#c084fc"][li%4]}"></span>`:""}${p.l}${isAp?" ✓":""}</button>`;});
    h+=`</div><div style="flex:1">`;
    order.forEach((oi,di)=>{const ip=pR.has(di),isAp=ap&&ap.di===di,le=Object.entries(ma).find(([_,v])=>v===di),pc=le?["#00ff88","#00d4ff","#ff6b35","#c084fc"][parseInt(le[0])%4]:null;h+=`<button class="mb ${ip?"mpaired":""} ${S.mSel!==null&&!ip?"mwait":""} ${isAp?"mpaired":""}" onclick="${isAp||ip?"":"tapR("+di+")"}">${(ip||isAp)?`<span class="pd" style="background:${pc||"#00ff88"}"></span>`:""}${q.pairs[oi].r}${isAp?" ✓":""}</button>`;});
    h+=`</div></div>`;}
  const isLast=S.qIdx>=qs.length-1;
  h+=`<div style="display:flex;gap:12px;margin-top:22px;padding-bottom:22px"><button class="hf nav-btn" onclick="navQ(-1)" style="background:var(--card);border:1px solid rgba(107,127,163,.15);color:${S.qIdx===0?"var(--dim)":"var(--text)"};font-size:var(--fs-sm);opacity:${S.qIdx===0?".4":"1"}">← PREV</button>`;
  if(isLast)h+=`<button class="hf nav-btn" onclick="submitAnswers()" style="background:linear-gradient(135deg,var(--neon),var(--cyan));color:var(--bg);font-size:var(--fs-sm);font-weight:700;letter-spacing:1px">🔓 SUBMIT</button>`;
  else h+=`<button class="hf nav-btn" onclick="navQ(1)" style="background:var(--card2);border:1px solid rgba(0,212,255,.2);color:var(--cyan);font-size:var(--fs-sm)">NEXT →</button>`;
  h+=`</div>`;$("room-wrap").innerHTML=h;
}

window.jumpQ=function(i){S.qIdx=i;S.mSel=null;renderRoom();}
window.navQ=function(d){const n=S.qIdx+d;if(n>=0&&n<QS[S.cur].length){S.qIdx=n;S.mSel=null;renderRoom();}}
window.pickMC=function(oi){const hi=S.hints[S.cur];const allElim=[];if(hi.f&&hi.fq===S.qIdx)allElim.push(...hi.fe);if(hi.o&&hi.oq===S.qIdx)allElim.push(...hi.oe);if(allElim.includes(oi))return;S.ans[S.cur][S.qIdx]=oi;renderRoom();}
window.pickTF=function(v){S.ans[S.cur][S.qIdx]=v;renderRoom();}
window.tapL=function(i){S.mSel=S.mSel===i?null:i;renderRoom();}
window.tapR=function(di){if(S.mSel===null)return;const c={...(S.ans[S.cur][S.qIdx]||{})};Object.keys(c).forEach(k=>{if(parseInt(k)===S.mSel||c[k]===di)delete c[k]});c[S.mSel]=di;S.ans[S.cur][S.qIdx]=c;S.mSel=null;renderRoom();}
window.unpairM=function(li){const c={...(S.ans[S.cur][S.qIdx]||{})};delete c[li];S.ans[S.cur][S.qIdx]=c;renderRoom();}

// HINTS
window.use5050=function(){const hi=S.hints[S.cur],q=QS[S.cur][S.qIdx];if(hi.f)return;hi.f=true;hi.fq=S.qIdx;
  if(q.type==="mc"){const wrong=q.opts.map((_,i)=>i).filter(i=>i!==q.ans);hi.fe=wrong.slice(0,2);if(hi.fe.includes(S.ans[S.cur][S.qIdx]))S.ans[S.cur][S.qIdx]=null;}
  else if(q.type==="tf"){hi.fe=!q.ans;}
  else if(q.type==="match"){const order=S.mOrd[S.cur]?.[S.qIdx]||q.pairs.map((_,i)=>i);const di=order.indexOf(0);hi.fe={li:0,di:di};const c={...(S.ans[S.cur][S.qIdx]||{})};c[0]=di;S.ans[S.cur][S.qIdx]=c;}
  renderRoom();};
window.useWhisper=function(){const hi=S.hints[S.cur];if(hi.w)return;hi.w=true;hi.wq=S.qIdx;renderRoom()};
window.useOddOut=function(){const hi=S.hints[S.cur],q=QS[S.cur][S.qIdx];if(hi.o)return;hi.o=true;hi.oq=S.qIdx;
  if(q.type==="mc"){const alreadyElim=(hi.f&&hi.fq===S.qIdx)?hi.fe:[];const wrong=q.opts.map((_,i)=>i).filter(i=>i!==q.ans&&!alreadyElim.includes(i));if(wrong.length>0)hi.oe=[wrong[0]];else hi.oe=[];if(hi.oe.includes(S.ans[S.cur][S.qIdx]))S.ans[S.cur][S.qIdx]=null;}
  else if(q.type==="tf"){hi.oe=!q.ans;}
  else if(q.type==="match"){const order=S.mOrd[S.cur]?.[S.qIdx]||q.pairs.map((_,i)=>i);const idx=q.pairs.length>1?1:0;const di=order.indexOf(idx);hi.oe={li:idx,di:di};const c={...(S.ans[S.cur][S.qIdx]||{})};c[idx]=di;S.ans[S.cur][S.qIdx]=c;}
  renderRoom();};

// SUBMIT
window.submitAnswers=function(){
  const qs=QS[S.cur];let allOk=true;
  for(let i=0;i<qs.length;i++){const q=qs[i],a=S.ans[S.cur][i];
    if(q.type==="mc"&&a!==q.ans){allOk=false;break}
    if(q.type==="tf"&&a!==q.ans){allOk=false;break}
    if(q.type==="match"){const order=S.mOrd[S.cur]?.[i];if(!a||typeof a!=="object"){allOk=false;break}const ok=q.pairs.every((_,li)=>{const ui=a[li];return ui!==undefined&&ui!==null&&order[ui]===li});if(!ok){allOk=false;break}}
  }
  if(allOk){
    $("check-wrap").innerHTML=`<div style="font-size:56px;margin-bottom:16px">✅</div><div class="hf" style="font-size:var(--fs-xl);font-weight:700;color:var(--neon);margin-bottom:8px">ALL ANSWERS VERIFIED!</div><p style="color:var(--dim);margin-bottom:24px;line-height:1.5;font-size:var(--fs-sm)">Ask your teacher to enter the password.</p><input id="pw-input" type="password" inputmode="numeric" maxlength="5" placeholder="•••••" style="width:220px;padding:18px;background:var(--card);border:2px solid rgba(0,255,136,.3);border-radius:12px;color:var(--neon);font-size:var(--fs-xl);text-align:center;letter-spacing:14px;font-family:'Source Code Pro',monospace"><div id="pw-error" style="color:var(--danger);font-size:var(--fs-xs);margin-top:8px;min-height:22px"></div><button class="hf" onclick="checkPW()" style="margin-top:12px;padding:16px 44px;background:linear-gradient(135deg,var(--neon),var(--cyan));border-radius:12px;color:var(--bg);font-size:var(--fs-sm);font-weight:700;letter-spacing:1px">UNLOCK ROOM</button><br><button class="mf" onclick="backFromCheck()" style="margin-top:14px;background:none;color:var(--dim);font-size:var(--fs-xs)">← Back to Room</button>`;
    show("check-screen");setTimeout(()=>$("pw-input")?.focus(),100);
  } else {
    S.lives--;sync();
    if(S.lives<=0){sync();show("gameover-screen");$("giveup-container").style.display="none";return}
    $("check-wrap").innerHTML=`<div style="font-size:56px;margin-bottom:16px">⚠️</div><div class="hf" style="font-size:var(--fs-xl);font-weight:700;color:var(--warn);margin-bottom:8px">NOT ALL ANSWERS ARE CORRECT</div><p style="color:var(--dim);margin-bottom:14px;line-height:1.5;font-size:var(--fs-sm)">One or more answers are incorrect. You will <strong>not</strong> be told which ones. Review carefully.</p><div style="margin-bottom:20px">${livesHTML()}</div><p class="mf" style="color:var(--danger);font-size:var(--fs-sm);margin-bottom:24px">${S.lives} Life Power${S.lives!==1?"s":""} remaining</p><button class="hf" onclick="backFromCheck()" style="padding:16px 44px;background:var(--card);border:1px solid rgba(255,107,53,.3);border-radius:12px;color:var(--warn);font-size:var(--fs-sm);font-weight:600">← BACK TO ROOM</button>`;
    show("check-screen");
  }
};
window.checkPW=function(){const pw=$("pw-input").value;if(pw===PW[S.cur]){S.rooms[S.cur]="unlocked";confetti();sync();if(Object.values(S.rooms).every(v=>v==="unlocked")){S.endTime=Date.now();sync();setTimeout(renderCongrats,1500)}else{$("check-wrap").innerHTML=`<div style="font-size:64px;margin-bottom:16px;animation:float 2s ease-in-out infinite">🔓</div><div class="hf" style="font-size:var(--fs-2xl);font-weight:900;color:var(--neon);text-shadow:0 0 30px rgba(0,255,136,.4)">ROOM UNLOCKED!</div><p style="color:var(--dim);margin-top:12px;margin-bottom:24px;font-size:var(--fs-sm)">You've escaped <strong style="color:var(--text)">${RM[S.cur-1].name}</strong>!</p><button class="hf" onclick="renderHallway()" style="padding:16px 44px;background:linear-gradient(135deg,var(--neon),var(--cyan));border-radius:12px;color:var(--bg);font-size:var(--fs-sm);font-weight:700;letter-spacing:1px">BACK TO HALLWAY</button>`}}else{$("pw-error").textContent="Incorrect password.";$("pw-input").value="";$("pw-input").focus()}};
window.backFromCheck=function(){renderRoom();show("room-screen");}

// CONGRATS
function renderCongrats(){confetti();$("giveup-container").style.display="none";const t=fmtTime(S.endTime-S.startTime),d=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  $("congrats-wrap").innerHTML=`<div style="font-size:64px;margin-bottom:12px">🎉</div><div class="hf" style="font-size:var(--fs-2xl);font-weight:900;color:var(--neon);text-shadow:0 0 30px rgba(0,255,136,.4);margin-bottom:8px">ALL LABS ESCAPED!</div><p style="color:var(--dim);margin-bottom:28px;line-height:1.5;font-size:var(--fs-sm)">Outstanding work, operatives!</p>
  <div style="background:linear-gradient(135deg,var(--card),var(--card2));border:2px solid rgba(0,255,136,.3);border-radius:18px;padding:36px 28px;text-align:center;position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#00ff88,#00d4ff,#c084fc,#ff6b35,#ffe066)"></div><div style="font-size:var(--fs-xs);letter-spacing:3px;color:var(--dim);margin-bottom:8px">CERTIFICATE OF COMPLETION</div><div class="hf" style="font-size:var(--fs-lg);font-weight:900;color:var(--neon);letter-spacing:2px;margin-bottom:4px">LANGLAB ESCAPE</div><div style="width:40px;height:2px;background:linear-gradient(90deg,transparent,var(--neon),transparent);margin:16px auto"></div><div style="font-size:var(--fs-sm);color:var(--dim)">This certifies that</div><div class="hf" style="font-size:var(--fs-xl);font-weight:700;color:var(--cyan);margin:8px 0">${S.team}</div><div style="font-size:var(--fs-sm);color:var(--dim)">${playerLabel()}</div><div style="font-size:var(--fs-sm);color:var(--dim);line-height:1.6;margin:16px 0">has successfully escaped all five rooms of LangLab Escape, demonstrating proficiency in English Language Teaching knowledge.</div><div style="display:flex;justify-content:center;gap:28px;margin:22px 0"><div><div class="mf" style="font-size:var(--fs-xs);color:var(--dim);letter-spacing:1px">TIME</div><div class="mf" style="font-size:var(--fs-lg);font-weight:700;color:var(--warn)">${t}</div></div><div><div class="mf" style="font-size:var(--fs-xs);color:var(--dim);letter-spacing:1px">LIVES LEFT</div><div class="mf" style="font-size:var(--fs-lg);font-weight:700;color:var(--neon)">${S.lives}/6</div></div></div><div style="width:40px;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);margin:16px auto"></div><div style="font-size:var(--fs-xs);color:var(--dim)">${d}</div><div style="font-size:var(--fs-xs);color:var(--dark);margin-top:4px">LAEN475 · English Language Teaching</div><div style="position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#ffe066,#ff6b35,#c084fc,#00d4ff,#00ff88)"></div></div>`;
  show("congrats-screen");
}

show("login-screen");
</script>
</body>
